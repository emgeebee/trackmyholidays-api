service: holidays

frameworkVersion: "3"

plugins:
  - serverless-dynamodb-local
  - serverless-offline
  - serverless-apigateway-service-proxy


custom:
  myStage: ${opt:stage, self:provider.stage}

  dynamodb:
    start:
      port: 8000
      inMemory: true
      migrate: true
    migration:
      dir: offline/migrations
    stages:
      - dev
      - prod
  authorizers:
    auth:
      name: authFunc
      type: request
      identitySource: method.request.header.Authorization
  apiGatewayServiceProxies:
    - s3:
        path: /
        method: get
        action: GetObject
        bucket:
          Ref: holidaysStaticFilesBucket
        key: 'index.html'
        cors: true
    - s3:
        path: /{asset}
        method: get
        action: GetObject
        bucket:
          Ref: holidaysStaticFilesBucket
        key:
          pathParam: asset
        cors: true

provider:
  name: aws
  runtime: nodejs20.x
  environment:
    DYNAMODB_TABLE: "holidays"
    STAGE: ${self:custom.myStage}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID}
    TOKEN_SIGNING_SECRET: ${env:TOKEN_SIGNING_SECRET}
    TOKEN_EXPIRY: ${env:TOKEN_EXPIRY, '365d'}
    TOKENS_TABLE: tokens
    DOCS_BUCKET:
      Ref: holidaysStaticFilesBucket
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource: 
        - "arn:aws:dynamodb:${opt:region, self:provider.region}:*:table/${self:provider.environment.DYNAMODB_TABLE}-${self:custom.myStage}"
        - "arn:aws:dynamodb:${opt:region, self:provider.region}:*:table/${self:provider.environment.TOKENS_TABLE}-${self:custom.myStage}"
        - "arn:aws:dynamodb:${opt:region, self:provider.region}:*:table/${self:provider.environment.TOKENS_TABLE}-${self:custom.myStage}/index/*"
    - Effect: Allow
      Action:
        - apigateway:GET
        - apigateway:POST
        - apigateway:PUT
        - apigateway:DELETE
        - apigateway:PATCH
      Resource: "*"
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject
        - s3:ListBucket
      Resource:
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Ref: holidaysStaticFilesBucket
        - Fn::Join:
            - ''
            - - 'arn:aws:s3:::'
              - Ref: holidaysStaticFilesBucket
              - '/*'

functions:
  authFunc:
    handler: auth/auth.authorizer

  create:
    handler: holidays/create.create
    events:
      - http:
          path: holidays
          method: post
          cors: true
          authorizer: ${self:custom.authorizers.auth}

  get:
    handler: holidays/get.get
    events:
      - http:
          path: holidays
          method: get
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  update:
    handler: holidays/update.update
    events:
      - http:
          path: holidays/{id}
          method: put
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  generateToken:
    handler: holidays/generateToken.generateToken
    events:
      - http:
          path: generateToken
          method: post
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  getMyTokens:
    handler: holidays/getMyTokens.getMyTokens
    events:
      - http:
          path: tokens
          method: get
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  expireToken:
    handler: holidays/expireToken.expireToken
    events:
      - http:
          path: expireToken
          method: post
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  docsCreate:
    handler: holidays/docs/create.create
    events:
      - http:
          path: docs
          method: post
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  docsList:
    handler: holidays/docs/list.list
    events:
      - http:
          path: docs
          method: get
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  docsGet:
    handler: holidays/docs/get.get
    events:
      - http:
          path: docs/{id}
          method: get
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  docsUpdate:
    handler: holidays/docs/update.update
    events:
      - http:
          path: docs/{id}
          method: put
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

  docsDelete:
    handler: holidays/docs/delete.delete
    events:
      - http:
          path: docs/{id}
          method: delete
          cors: true
          authorizer:
            name: authFunc
            identitySource: method.request.header.Authorization

resources:
  Resources:
    holidaysStaticFilesBucket:
      Type: AWS::S3::Bucket

    holidaysTokensTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        AttributeDefinitions:
          - AttributeName: token
            AttributeType: S
          - AttributeName: userid
            AttributeType: S
        KeySchema:
          - AttributeName: token
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userid-index
            KeySchema:
              - AttributeName: userid
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 1
              WriteCapacityUnits: 1
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1
        TableName: ${self:provider.environment.TOKENS_TABLE}-${self:custom.myStage}

    # holidaysDynamoDbTable:
    #   Type: 'AWS::DynamoDB::Table'
    #   DeletionPolicy: Retain
    #   UpdateReplacePolicy: Retain
    #   Properties:
    #     AttributeDefinitions:
    #       -
    #         AttributeName: id
    #         AttributeType: S
    #     KeySchema:
    #       -
    #         AttributeName: id
    #         KeyType: HASH
    #     ProvisionedThroughput:
    #       ReadCapacityUnits: 1
    #       WriteCapacityUnits: 1
    #     TableName: ${self:provider.environment.DYNAMODB_TABLE}-${self:custom.myStage}
        
    AuthFailureGatewayResponse:
      Type: 'AWS::ApiGateway::GatewayResponse'
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        ResponseType: UNAUTHORIZED
        RestApiId:
          Ref: 'ApiGatewayRestApi'
        StatusCode: '401'
